<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>UI_Setting Mockup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    /* ── 팝업 전체 컨테이너 ── */
    .popup {
      width: 620px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    /* ── 헤더 ── */
    .popup-header {
      background: #0f3460;
      padding: 16px 24px;
      font-size: 18px;
      font-weight: 700;
      color: #e0e0e0;
      letter-spacing: 1px;
    }

    /* ── 탭 바 ── */
    .tab-bar {
      display: flex;
      background: #0d1b2a;
      border-bottom: 2px solid #0f3460;
    }

    .tab {
      flex: 1;
      padding: 14px 0;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #7a8a9a;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s, color 0.15s;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }

    .tab:hover {
      background: #1a2a3a;
      color: #c0d0e0;
    }

    /* 활성 탭 */
    .tab.active {
      color: #e8f4ff;
      border-bottom: 3px solid #4a9eff;
      background: #16213e;
    }

    /* ── 탭 콘텐츠 공통 ── */
    .tab-content {
      padding: 24px;
      min-height: 360px;
      display: none;
    }
    .tab-content.active { display: block; }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #4a9eff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      padding-bottom: 6px;
      border-bottom: 1px solid #1e3050;
    }

    .option-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #1a2a3a;
    }
    .option-row:last-child { border-bottom: none; }

    .option-label {
      font-size: 14px;
      color: #b0bec5;
    }

    /* 드롭다운 스타일 */
    .option-select {
      background: #0d1b2a;
      border: 1px solid #2a4060;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 5px 10px;
      font-size: 13px;
      min-width: 140px;
      cursor: pointer;
    }

    /* 슬라이더 스타일 */
    .option-slider {
      -webkit-appearance: none;
      width: 160px;
      height: 4px;
      border-radius: 2px;
      background: #2a4060;
      outline: none;
    }
    .option-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #4a9eff;
      cursor: pointer;
    }

    /* 토글 스타일 */
    .toggle {
      position: relative;
      width: 44px;
      height: 22px;
    }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #2a4060;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: #4a9eff; }
    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: left 0.2s;
      pointer-events: none;
    }
    .toggle input:checked ~ .toggle-thumb { left: 25px; }

    /* ── 하단 버튼 바 ── */
    .popup-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 24px;
      background: #0d1b2a;
      border-top: 1px solid #0f3460;
    }

    .btn {
      padding: 8px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    .btn-apply  { background: #4a9eff; color: #fff; }
    .btn-cancel { background: #2a4060; color: #b0bec5; }
    .btn-apply:hover  { background: #3a8eef; }
    .btn-cancel:hover { background: #3a5070; }
  </style>
</head>
<body>

<div class="popup">

  <!-- 헤더 -->
  <div class="popup-header">SETTINGS</div>

  <!-- 탭 바 -->
  <div class="tab-bar">
    <div class="tab active"  id="tab-general"  onclick="switchTab('general')">General</div>
    <div class="tab"         id="tab-graphic"  onclick="switchTab('graphic')">Graphic</div>
    <div class="tab"         id="tab-audio"    onclick="switchTab('audio')">Audio</div>
  </div>

  <!-- ── General 콘텐츠 ── -->
  <div class="tab-content active" id="content-general">
    <div class="section-title">General</div>

    <div class="option-row">
      <span class="option-label">Language</span>
      <select class="option-select">
        <option>Korean</option>
        <option>English</option>
        <option>Japanese</option>
      </select>
    </div>

    <div class="option-row">
      <span class="option-label">Show FPS</span>
      <label class="toggle">
        <input type="checkbox" checked />
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

    <div class="option-row">
      <span class="option-label">Mouse Sensitivity</span>
      <input type="range" class="option-slider" min="0" max="100" value="50" />
    </div>

    <div class="option-row">
      <span class="option-label">Auto-Save</span>
      <label class="toggle">
        <input type="checkbox" />
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
  </div>

  <!-- ── Graphic 콘텐츠 ── -->
  <div class="tab-content" id="content-graphic">
    <div class="section-title">Graphic</div>

    <div class="option-row">
      <span class="option-label">Resolution</span>
      <select class="option-select">
        <option>1920 x 1080</option>
        <option>2560 x 1440</option>
        <option>3840 x 2160</option>
      </select>
    </div>

    <div class="option-row">
      <span class="option-label">Quality</span>
      <select class="option-select">
        <option>Low</option>
        <option>Medium</option>
        <option selected>High</option>
        <option>Ultra</option>
      </select>
    </div>

    <div class="option-row">
      <span class="option-label">V-Sync</span>
      <label class="toggle">
        <input type="checkbox" checked />
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

    <div class="option-row">
      <span class="option-label">Brightness</span>
      <input type="range" class="option-slider" min="0" max="100" value="70" />
    </div>

    <div class="option-row">
      <span class="option-label">Full Screen</span>
      <label class="toggle">
        <input type="checkbox" checked />
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
  </div>

  <!-- ── Audio 콘텐츠 ── -->
  <div class="tab-content" id="content-audio">
    <div class="section-title">Audio</div>

    <div class="option-row">
      <span class="option-label">Master Volume</span>
      <input type="range" class="option-slider" min="0" max="100" value="80" />
    </div>

    <div class="option-row">
      <span class="option-label">BGM Volume</span>
      <input type="range" class="option-slider" min="0" max="100" value="60" />
    </div>

    <div class="option-row">
      <span class="option-label">SFX Volume</span>
      <input type="range" class="option-slider" min="0" max="100" value="75" />
    </div>

    <div class="option-row">
      <span class="option-label">Voice Volume</span>
      <input type="range" class="option-slider" min="0" max="100" value="65" />
    </div>

    <div class="option-row">
      <span class="option-label">Mute All</span>
      <label class="toggle">
        <input type="checkbox" />
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
  </div>

  <!-- 하단 버튼 -->
  <div class="popup-footer">
    <button class="btn btn-cancel">Cancel</button>
    <button class="btn btn-apply">Apply</button>
  </div>

</div>

<script>
  /* 탭 전환 — 외형 확인용 최소 스크립트 */
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.getElementById('content-' + name).classList.add('active');
  }
</script>

</body>
</html>
